server:
  host: "127.0.0.1"
  port: 8000
  transport: "sse"

storage:
  primary_path: "data/primary"
  staging_path: "data/staging"
  sqlite_path: "data/mindvault.sqlite"

auth:
  agents:
    - token: "dev-admin-token"
      agent_id: "admin-agent"
      trust_level: 10
      allowed_libraries: ["primary", "staging"]
    - token: "dev-trusted-token"
      agent_id: "trusted-agent"
      trust_level: 5
      allowed_libraries: ["staging"]

extraction:
  mode: "conservative"
  llm_enabled: false
  llm_provider: "openai"
  llm_model: "gpt-4o-mini"
  llm_base_url: "https://api.openai.com/v1"
  llm_timeout_seconds: 15.0

embedding:
  provider: "none"

defaults:
  ingest_library: "staging"
  privacy_level: 3

verification:
  backend_mode: "none"
  external_validation_enabled: false
  external_validation_timeout_seconds: 5.0

dedup:
  similarity_threshold: 0.72

logging:
  level: "INFO"
